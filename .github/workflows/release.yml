name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # required for npm provenance (SLSA attestation)

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Surface the token at job level so step-level `if:` conditions
      # can read env.NPM_TOKEN. (A step's own `env:` block isn't in
      # scope during its `if:` evaluation.)
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspaces
        run: pnpm build

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          generate_release_notes: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: ${{ secrets.DEPLOY_OWNER }}
          repositories: ${{ secrets.DEPLOY_REPO_NAME }}

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ secrets.DEPLOY_OWNER }}/${{ secrets.DEPLOY_REPO_NAME }}
          event-type: deploy
          client-payload: '{"ref": "${{ github.ref }}"}'
